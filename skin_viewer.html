<!DOCTYPE html>
<html>
<head>
<style>
body { background: #111; color: white; font-family: sans-serif; padding: 10px; margin:0; }
h3 { color: #adf; margin: 15px 0 5px; }
.row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.card { background: #222; border-radius: 6px; padding: 6px; text-align: center; font-size: 11px; }
canvas { display: block; }
</style>
</head>
<body>
<p style="color:#ff8">Cada fila = una skin. Cada columna = una rotación diferente. Dime qué columna se ve de pie para cada skin.</p>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const SKINS = [
  { name:'Iron Man',      glb:'ironman.glb' },
  { name:'Spider-Gwen',   glb:'spider_gwen.glb' },
  { name:'Spider-Man',    glb:'spiderman.glb' },
  { name:'Tung Tung',     glb:'tung.glb' },
  { name:'Jonesy',        glb:'jonesy.glb' },
  { name:'Spider-Man FF', glb:'spiderman_ff.glb' },
];

// Rotaciones a probar: [rx, ry, rz] en grados
const ROTS = [
  [0,0,0],
  [-90,0,0],
  [90,0,0],
  [0,0,90],
  [0,0,-90],
  [180,0,0],
];

const loader = new GLTFLoader();
const W = 120, H = 180;
const D2R = Math.PI/180;

SKINS.forEach(skin => {
  const h3 = document.createElement('h3');
  h3.textContent = skin.name;
  document.body.appendChild(h3);

  const row = document.createElement('div');
  row.className = 'row';
  document.body.appendChild(row);

  loader.load('/models/' + skin.glb, (gltf) => {
    ROTS.forEach(([rx, ry, rz], i) => {
      const card = document.createElement('div');
      card.className = 'card';
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const label = document.createElement('div');
      label.textContent = `rx=${rx} ry=${ry} rz=${rz}`;
      card.appendChild(canvas);
      card.appendChild(label);
      row.appendChild(card);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setClearColor(0x111111, 1);

      const scene = new THREE.Scene();
      scene.add(new THREE.AmbientLight(0xffffff, 2.5));
      const dir = new THREE.DirectionalLight(0xffffff, 2);
      dir.position.set(2, 5, 3);
      scene.add(dir);

      const camera = new THREE.PerspectiveCamera(35, W/H, 0.0001, 1000000);

      const model = gltf.scene.clone(true);
      model.rotation.set(rx*D2R, ry*D2R, rz*D2R);
      scene.add(model);

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const fovRad = camera.fov * Math.PI / 180;
      const dist = (maxDim / 2) / Math.tan(fovRad / 2) * 1.8;
      camera.position.set(center.x, center.y, center.z + dist);
      camera.lookAt(center.x, center.y, center.z);

      renderer.render(scene, camera);
    });
  });
});
</script>
</body>
</html>
