<!DOCTYPE html>
<html>
<head>
<style>
body { background: #111; color: white; font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; margin:0; }
.card { background: #222; border-radius: 8px; padding: 8px; text-align: center; }
canvas { display: block; }
p { margin: 6px 0 0; font-size: 13px; }
</style>
</head>
<body>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const SKINS = [
  { name:'Iron Man',       glb:'ironman.glb',      rotX: Math.PI/2 },
  { name:'Spider-Gwen',    glb:'spider_gwen.glb',  rotX: Math.PI/2 },
  { name:'Spider-Man',     glb:'spiderman.glb',    rotX: 0 },
  { name:'Tung Tung',      glb:'tung.glb',         rotX: Math.PI/2 },
  { name:'Jonesy',         glb:'jonesy.glb',       rotX: Math.PI/2 },
  { name:'Peely',          glb:'peely.glb',        rotX: Math.PI/2 },
  { name:'Spider-Man FF',  glb:'spiderman_ff.glb', rotX: Math.PI/2 },
];

const loader = new GLTFLoader();
const W = 200, H = 320;

SKINS.forEach(skin => {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const label = document.createElement('p');
  label.textContent = skin.name;
  card.appendChild(canvas);
  card.appendChild(label);
  document.body.appendChild(card);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  scene.add(new THREE.AmbientLight(0xffffff, 2.5));
  const dir = new THREE.DirectionalLight(0xffffff, 2);
  dir.position.set(2, 5, 3);
  scene.add(dir);

  const camera = new THREE.PerspectiveCamera(35, W/H, 0.0001, 1000000);

  loader.load('/models/' + skin.glb, (gltf) => {
    const model = gltf.scene;
    model.rotation.x = skin.rotX;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    // Tras rotX=PI/2: la altura del personaje está en Z
    // La cámara debe estar en Y- mirando hacia Y+, centrada en el Z del personaje
    const fovRad = camera.fov * Math.PI / 180;

    if (skin.rotX !== 0) {
      // Personaje de pie con altura en Z: cámara enfrente en Y negativo
      const heightZ = size.z;
      const widthX = size.x;
      const dist = Math.max(widthX, heightZ) / 2 / Math.tan(fovRad/2) * 1.5;
      const lookZ = center.z; // centro Z = mitad del cuerpo
      camera.position.set(center.x, center.y - dist, lookZ);
      camera.lookAt(center.x, center.y, lookZ);
      camera.up.set(0, 0, 1); // Z es arriba ahora
    } else {
      // Spider-Man sin rotar: altura en Y
      const dist = size.y / 2 / Math.tan(fovRad/2) * 1.5;
      camera.position.set(center.x, center.y, center.z + dist);
      camera.lookAt(center.x, center.y, center.z);
    }

    const mixer = gltf.animations.length ? new THREE.AnimationMixer(model) : null;
    if (mixer) mixer.clipAction(gltf.animations[0]).play();
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      if (mixer) mixer.update(clock.getDelta());
      model.rotation.y += 0.008;
      renderer.render(scene, camera);
    }
    animate();
  });
});
</script>
</body>
</html>
